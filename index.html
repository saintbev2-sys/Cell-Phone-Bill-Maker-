<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cell Phone Bill Maker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e8e4d9;font-family:'Courier New',monospace;min-height:100vh}
input,select{background:#13131f;border:1px solid #2a2a3a;border-radius:6px;color:#e8e4d9;padding:9px 12px;font-size:13px;font-family:inherit;outline:none;width:100%}
input:focus,select:focus{border-color:#c8f060}
select option{background:#13131f}
@media print{.no-print{display:none!important}body{background:white;color:black}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const PLANS=[{label:"Basic 5GB",price:25},{label:"Standard 15GB",price:40},{label:"Unlimited",price:55},{label:"Unlimited Premium",price:70},{label:"Custom",price:0}];
const AOP={hotspot:10,insurance:12,intl:15};
const AOL={hotspot:"Mobile Hotspot",insurance:"Device Insurance",intl:"Int'l Calling"};
const DL={name:"",phone:"",plan:PLANS[1].label,planPrice:PLANS[1].price,customPrice:"",addOns:{hotspot:false,insurance:false,intl:false},dataUsed:"",calls:""};
const fmt=v=>`$${Number(v).toFixed(2)}`;
const lt=line=>{const b=line.plan==="Custom"?(parseFloat(line.customPrice)||0):line.planPrice;return b+Object.entries(line.addOns).reduce((s,[k,v])=>s+(v?AOP[k]:0),0);};

function LineTile({line,idx,onChange,onRemove}){
  return(
    <div style={{background:"#111120",border:"1px solid #1e1e2e",borderRadius:10,padding:"16px 18px",marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <span style={{fontSize:11,fontWeight:800,letterSpacing:"0.2em",color:"#c8f060"}}>LINE {idx+1}</span>
        {idx>0&&<button onClick={()=>onRemove(idx)} style={{background:"transparent",border:"1px solid #3a1a1a",color:"#f06060",borderRadius:5,padding:"4px 10px",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>✕ Remove</button>}
      </div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:12}}>
        <div style={{flex:"1 1 150px"}}><div style={{fontSize:10,color:"#666",letterSpacing:"0.1em",marginBottom:4}}>NAME</div><input placeholder="Full Name" value={line.name} onChange={e=>onChange(idx,{name:e.target.value})}/></div>
        <div style={{flex:"1 1 150px"}}><div style={{fontSize:10,color:"#666",letterSpacing:"0.1em",marginBottom:4}}>PHONE</div><input placeholder="(801) 000-0000" value={line.phone} onChange={e=>onChange(idx,{phone:e.target.value})}/></div>
      </div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:12}}>
        <div style={{flex:"1 1 150px"}}><div style={{fontSize:10,color:"#666",letterSpacing:"0.1em",marginBottom:4}}>PLAN</div>
          <select value={line.plan} onChange={e=>{const p=PLANS.find(x=>x.label===e.target.value);onChange(idx,{plan:p.label,planPrice:p.price,customPrice:""});}}>
            {PLANS.map(p=><option key={p.label} value={p.label}>{p.label}{p.price>0?` — $${p.price}/mo`:""}</option>)}
          </select>
        </div>
        {line.plan==="Custom"&&<div style={{flex:"1 1 110px"}}><div style={{fontSize:10,color:"#666",letterSpacing:"0.1em",marginBottom:4}}>CUSTOM ($)</div><input type="number" placeholder="0.00" value={line.customPrice} onChange={e=>onChange(idx,{customPrice:e.target.value})}/></div>}
        <div style={{flex:"1 1 110px"}}><div style={{fontSize:10,color:"#666",letterSpacing:"0.1em",marginBottom:4}}>DATA (GB)</div><input type="number" placeholder="8.4" value={line.dataUsed} onChange={e=>onChange(idx,{dataUsed:e.target.value})}/></div>
        <div style={{flex:"1 1 110px"}}><div style={{fontSize:10,color:"#666",letterSpacing:"0.1em",marginBottom:4}}>MINUTES</div><input type="number" placeholder="320" value={line.calls} onChange={e=>onChange(idx,{calls:e.target.value})}/></div>
      </div>
      <div style={{display:"flex",gap:18,flexWrap:"wrap",marginBottom:14}}>
        {Object.entries(AOL).map(([key,label])=>(
          <label key={key} style={{fontSize:12,color:"#aaa",cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
            <input type="checkbox" style={{width:"auto"}} checked={line.addOns[key]} onChange={()=>onChange(idx,{addOns:{...line.addOns,[key]:!line.addOns[key]}})}/>
            {label} (+${AOP[key]})
          </label>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:12,paddingTop:12,borderTop:"1px solid #1e1e2e"}}>
        <span style={{fontSize:11,color:"#666",letterSpacing:"0.1em"}}>LINE SUBTOTAL</span>
        <span style={{fontSize:20,fontWeight:800,color:"#c8f060"}}>{fmt(lt(line))}</span>
      </div>
    </div>
  );
}

function Preview({lines,billerName,billingMonth,taxRate,discount}){
  const subs=lines.map(lt);
  const sub=subs.reduce((a,b)=>a+b,0);
  const disc=parseFloat(discount)||0;
  const taxable=Math.max(0,sub-disc);
  const tax=taxable*((parseFloat(taxRate)||0)/100);
  const total=taxable+tax;
  return(
    <div style={{background:"#0d0d18",border:"1px solid #1e1e2e",borderRadius:12,overflow:"hidden",maxWidth:900,margin:"0 auto"}}>
      <div style={{background:"#111125",padding:"20px 24px",display:"flex",justifyContent:"space-between",alignItems:"flex-start",borderBottom:"2px solid #c8f060"}}>
        <div>
          <div style={{fontSize:22,fontWeight:900,letterSpacing:"0.12em",color:"#c8f060"}}>{billerName||"My Wireless"}</div>
          <div style={{fontSize:11,color:"#555",marginTop:2,letterSpacing:"0.1em"}}>Monthly Statement</div>
        </div>
        <div style={{fontSize:14,color:"#888",fontWeight:700}}>{billingMonth||"—"}</div>
      </div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr>{["#","Name","Phone","Plan","Add-Ons","Data","Mins","Amount"].map(h=><th key={h} style={{padding:"10px 14px",background:"#0a0a14",color:"#555",textAlign:"left",fontSize:10,letterSpacing:"0.12em",fontWeight:700,textTransform:"uppercase",borderBottom:"1px solid #1e1e2e"}}>{h}</th>)}</tr></thead>
          <tbody>
            {lines.map((line,i)=>{
              const aos=Object.entries(line.addOns).filter(([,v])=>v).map(([k])=>AOL[k]).join(", ");
              return(<tr key={i} style={{background:i%2===0?"#0d0d18":"#0f0f1e"}}>
                <td style={{padding:"11px 14px",borderBottom:"1px solid #13131f"}}>{i+1}</td>
                <td style={{padding:"11px 14px",borderBottom:"1px solid #13131f"}}>{line.name||"—"}</td>
                <td style={{padding:"11px 14px",borderBottom:"1px solid #13131f"}}>{line.phone||"—"}</td>
                <td style={{padding:"11px 14px",borderBottom:"1px solid #13131f"}}>{line.plan}</td>
                <td style={{padding:"11px 14px",borderBottom:"1px solid #13131f"}}>{aos||"None"}</td>
                <td style={{padding:"11px 14px",borderBottom:"1px solid #13131f"}}>{line.dataUsed?`${line.dataUsed} GB`:"—"}</td>
                <td style={{padding:"11px 14px",borderBottom:"1px solid #13131f"}}>{line.calls?`${line.calls} min`:"—"}</td>
                <td style={{padding:"11px 14px",borderBottom:"1px solid #13131f",fontWeight:700,color:"#c8f060"}}>{fmt(subs[i])}</td>
              </tr>);
            })}
          </tbody>
        </table>
      </div>
      <div style={{padding:"16px 24px",borderTop:"1px solid #1e1e2e",maxWidth:320,marginLeft:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#888",marginBottom:8}}><span>Subtotal</span><span>{fmt(sub)}</span></div>
        {disc>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#4ade80",marginBottom:8}}><span>Discount</span><span>− {fmt(disc)}</span></div>}
        <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#888",marginBottom:8}}><span>Tax ({taxRate||0}%)</span><span>{fmt(tax)}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:18,fontWeight:900,color:"#c8f060",marginTop:10,paddingTop:10,borderTop:"1px solid #2a2a3a",letterSpacing:"0.08em"}}><span>TOTAL DUE</span><span>{fmt(total)}</span></div>
      </div>
      <div style={{textAlign:"center",padding:"12px",fontSize:10,color:"#333",letterSpacing:"0.1em",borderTop:"1px solid #1a1a2a"}}>
        Generated by Saint Bev Bill Maker • {new Date().toLocaleDateString()}
      </div>
    </div>
  );
}

function App(){
  const [lines,setLines]=useState([{...DL}]);
  const [billerName,setBillerName]=useState("My Wireless");
  const [billingMonth,setBillingMonth]=useState("");
  const [taxRate,setTaxRate]=useState("8");
  const [discount,setDiscount]=useState("");
  const [view,setView]=useState("edit");
  const upd=(idx,u)=>setLines(prev=>prev.map((l,i)=>i===idx?{...l,...u}:l));
  const addLine=()=>setLines(prev=>[...prev,{...DL}]);
  const rem=idx=>setLines(prev=>prev.filter((_,i)=>i!==idx));
  const label=billingMonth?new Date(billingMonth+"-02").toLocaleDateString("en-US",{month:"long",year:"numeric"}):"";
  return(
    <div style={{minHeight:"100vh",background:"#0a0a0f",color:"#e8e4d9",fontFamily:"'Courier New',monospace"}}>
      <header className="no-print" style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 20px",borderBottom:"1px solid #2a2a3a",background:"#0d0d18",flexWrap:"wrap",gap:12}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <span style={{fontSize:30}}>📱</span>
          <div>
            <div style={{fontSize:20,fontWeight:900,letterSpacing:"0.18em",color:"#c8f060"}}>BILL MAKER</div>
            <div style={{fontSize:10,color:"#555",letterSpacing:"0.1em"}}>Cell Plan Invoice Generator</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          {["edit","preview"].map(v=>(
            <button key={v} onClick={()=>setView(v)} style={{padding:"8px 18px",background:view===v?"#c8f060":"transparent",border:`1px solid ${view===v?"#c8f060":"#333"}`,color:view===v?"#0a0a0f":"#888",borderRadius:6,cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:view===v?700:400,letterSpacing:"0.05em"}}>
              {v==="edit"?"✏️ Edit":"👁 Preview"}
            </button>
          ))}
        </div>
      </header>
      {view==="edit"?(
        <div className="no-print" style={{padding:"20px 20px 80px"}}>
          <div style={{marginBottom:32}}>
            <div style={{fontSize:11,letterSpacing:"0.2em",color:"#c8f060",marginBottom:14,fontWeight:700,borderLeft:"3px solid #c8f060",paddingLeft:10}}>ACCOUNT INFO</div>
            <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
              <div style={{flex:"1 1 160px"}}><div style={{fontSize:10,color:"#666",letterSpacing:"0.1em",marginBottom:4}}>BUSINESS NAME</div><input value={billerName} onChange={e=>setBillerName(e.target.value)} placeholder="My Wireless"/></div>
              <div style={{flex:"1 1 140px"}}><div style={{fontSize:10,color:"#666",letterSpacing:"0.1em",marginBottom:4}}>BILLING MONTH</div><input type="month" value={billingMonth} onChange={e=>setBillingMonth(e.target.value)}/></div>
              <div style={{flex:"1 1 100px"}}><div style={{fontSize:10,color:"#666",letterSpacing:"0.1em",marginBottom:4}}>TAX RATE (%)</div><input type="number" value={taxRate} onChange={e=>setTaxRate(e.target.value)} placeholder="8"/></div>
              <div style={{flex:"1 1 100px"}}><div style={{fontSize:10,color:"#666",letterSpacing:"0.1em",marginBottom:4}}>DISCOUNT ($)</div><input type="number" value={discount} onChange={e=>setDiscount(e.target.value)} placeholder="0.00"/></div>
            </div>
          </div>
          <div>
            <div style={{fontSize:11,letterSpacing:"0.2em",color:"#c8f060",marginBottom:14,fontWeight:700,borderLeft:"3px solid #c8f060",paddingLeft:10}}>LINES ({lines.length})</div>
            {lines.map((line,i)=><LineTile key={i} line={line} idx={i} onChange={upd} onRemove={rem}/>)}
            <button onClick={addLine} style={{background:"transparent",border:"2px dashed #2a2a3a",color:"#555",borderRadius:8,padding:"12px 24px",cursor:"pointer",fontSize:13,fontFamily:"inherit",width:"100%",letterSpacing:"0.1em"}}>+ Add Line</button>
          </div>
        </div>
      ):(
        <div style={{padding:"24px 20px 80px"}}>
          <Preview lines={lines} billerName={billerName} billingMonth={label} taxRate={taxRate} discount={discount}/>
          <button className="no-print" onClick={()=>window.print()} style={{display:"block",margin:"18px auto 0",background:"#c8f060",color:"#0a0a0f",border:"none",borderRadius:8,padding:"13px 32px",fontSize:14,fontWeight:800,fontFamily:"inherit",cursor:"pointer",letterSpacing:"0.08em"}}>🖨 Print / Save as PDF</button>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
